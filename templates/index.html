<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1rem;
            box-sizing: border-box;
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .has-result {
            color: var(--text-main) !important;
            border-color: rgba(59, 130, 246, 0.3) !important;
            background: rgba(59, 130, 246, 0.05) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Emotion Detector</h1>
        <p class="subtitle">Analyze text sentiments instantly</p>
        
        <textarea id="textToAnalyse" placeholder="Type or paste your text here..."></textarea>
        <button onclick="runAnalysis()">Analyze Sentiment</button>
        
        <div id="result">
            Awaiting analysis input...
        </div>
    </div>

    <script>
        function runAnalysis() {
            const text = document.getElementById("textToAnalyse").value;
            const resultDiv = document.getElementById("result");
            
            resultDiv.innerText = "Analyzing...";
            resultDiv.classList.remove("has-result");
            
            fetch(`/emotionDetector?textToAnalyse=${encodeURIComponent(text)}`)
                .then(response => response.text())
                .then(data => {
                    resultDiv.innerText = data;
                    resultDiv.classList.add("has-result");
                })
                .catch(err => {
                    resultDiv.innerText = "Error contacting the server.";
                    console.error(err);
                });
        }
    </script>
</body>
</html>
